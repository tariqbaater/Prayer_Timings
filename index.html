<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Adhan Timings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="title-banner">
        <h1 class="page-title">Adhan Timings</h1>
      </div>
      <div class="bar">
        <div class="left">
          <div class="chip">
            <span>📍</span>
            <select id="city" aria-label="City"></select>
          </div>

          <div class="chip">
            <span>🧭</span>
            <span>Lat</span
            ><input
              id="lat"
              type="number"
              step="0.0001"
              aria-label="Latitude"
            />
            <span style="opacity: 0.5">|</span>
            <span>Lng</span
            ><input
              id="lng"
              type="number"
              step="0.0001"
              aria-label="Longitude"
            />
          </div>

          <div class="chip chip--hidden" id="chipMethod">
            <span>🧮</span>
            <span>Method</span>
            <select id="method" aria-label="Calculation method"></select>
          </div>

          <div class="chip chip--hidden" id="chipTz">
            <span>🕒</span>
            <span>TZ</span>
            <input id="tz" type="number" step="0.5" aria-label="Timezone" />
            <span style="color: var(--muted)">hrs</span>
          </div>

          <div class="chip chip--hidden" id="chipLatLng">
            <span>🧭</span>
            <span>Lat</span
            ><input
              id="lat"
              type="number"
              step="0.0001"
              aria-label="Latitude"
            />
            <span style="opacity: 0.5">|</span>
            <span>Lng</span
            ><input
              id="lng"
              type="number"
              step="0.0001"
              aria-label="Longitude"
            />
          </div>

          <div class="chip">
            <span>🕒</span>
            <span>TZ</span>
            <input id="tz" type="number" step="0.5" aria-label="Timezone" />
            <span style="color: var(--muted)">hrs</span>
          </div>

          <div class="chip">
            <span>🗓️</span>
            <input id="start" type="date" aria-label="Start date" />
          </div>

          <div class="chip">
            <span>📅</span>
            <span>Days</span>
            <select id="days" aria-label="Number of days">
              <option>7</option>
              <option selected>10</option>
              <option>15</option>
              <option>30</option>
            </select>
          </div>

          <button class="btn chip" id="todayBtn" aria-label="Go to today">📆 Today</button>
          <button class="btn chip" id="copyBtn" aria-label="Copy today's times">📋 Copy</button>
          <button class="btn chip" id="toggleAdvanced" aria-label="Toggle advanced settings">⚙️ Advanced</button>


        </div>

        <!-- Removed generate button as auto-update handles regenerations -->
      </div>

      <div class="grid">
        <div class="card">
          <div class="inner">
            <div class="head">
              <div class="title">
                <div class="headline" id="subline">—</div>
                <div class="hijri-time mono" id="hijriDate">—</div>
              </div>

              <div class="midline mono" id="imsakIftar" aria-label="Imsak and Iftar times">
                Imsak --:-- | Iftar --:--
              </div>

              <div class="big">
                <div class="label" id="bigLabel">Today’s Iftar (Maghrib)</div>
                <div class="time mono" id="bigTime">--:--</div>
                <div class="meta mono" id="nowLine">—</div>
              </div>
            </div>

            <div
              class="stats"
              aria-label="Countdown to next prayer"
              aria-live="polite"
            >
              <div class="stat stat--current">
                <div class="n mono" id="currentName">—</div>
                <div class="k" id="currentLabel">Current</div>
              </div>
              <div class="stat">
                <div class="n mono" id="cdH">--</div>
                <div class="k">Hours</div>
              </div>
              <div class="stat">
                <div class="n mono" id="cdM">--</div>
                <div class="k">Minutes</div>
              </div>
              <div class="stat">
                <div class="n mono" id="cdS">--</div>
                <div class="k">Seconds</div>
              </div>
              <div class="stat stat--next">
                <div class="n mono" id="nextName">—</div>
                <div class="k" id="nextAt">Next</div>
              </div>
            </div>

            <div class="table" id="table"></div>


          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
